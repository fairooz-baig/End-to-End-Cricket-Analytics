resources:
  jobs:
    End_to_End_Cricket_Analytics_Job:
      name: End_to_End_Cricket_Analytics_Job
      tasks:
        - task_key: Bronze_Ingestion
          notebook_task:
            notebook_path: ../src/notebooks/Ingestion_Bronze.ipynb
            base_parameters:
              catalog_name: ${var.catalog}
            source: WORKSPACE
        - task_key: Bronze_Silver_Cricket
          depends_on:
            - task_key: Bronze_Ingestion
          pipeline_task:
            pipeline_id: ${resources.pipelines.E2E_Cricket_Analytics_AssetBundle_etl.id}
            full_refresh: false
        - task_key: Cricket_data_dashboard
          depends_on:
            - task_key: Bronze_Silver_Cricket
          dashboard_task:
            subscription: {}
            warehouse_id: b3a1e6bf1f318106
            dashboard_id: ${resources.dashboards.cricket_data.id}
      queue:
        enabled: true
      parameters:
        - name: catalog_name
          default: ${var.catalog}
      performance_target: PERFORMANCE_OPTIMIZED
