# This is a Databricks asset bundle definition for E2E_Cricket_Analytics_AssetBundle.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: E2E_Cricket_Analytics_AssetBundle
  uuid: 7030fefe-7045-4e12-9f99-80746f1d5af9

include:
  - resources/*.yml

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use
  warehouse_id:
    description: warehouse id

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-737802bb-a461.cloud.databricks.com
    variables:
      catalog: cricket_dev
      schema: dev
      warehouse_id: b3a1e6bf1f318106
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-737802bb-a461.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/fairoozbaig07@gmail.com to make sure we only have a single copy.
      root_path: /Workspace/Prod_End-to-End-Cricket-Analytics
    variables:
      catalog: cricket_prod
      schema: prod
    permissions:
      - user_name: fairoozbaig07@gmail.com
        level: CAN_MANAGE
